{% extends "base.html" %}

{% block title %}Live Recognition - Face Recognition Attendance{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h5>Live Face Recognition</h5>
            </div>
            <div class="card-body">
                <div class="text-center">
                    <img src="{{ url_for('video_feed') }}" class="img-fluid" alt="Video Feed">
                </div>
                <div class="mt-3">
                    <p class="text-muted">The camera is active. Faces will be detected and attendance will be marked automatically.</p>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
